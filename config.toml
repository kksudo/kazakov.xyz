baseurl = "https://kazakov.xyz"
title = "DevOps with love"
theme = "hugo-coder-forked"
languagecode = "en"
defaultcontentlanguage = "en"

[pagination]
pagerSize = 20

pygmentsstyle = "bw"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

disqusShortname = "kksudo"
enableGitInfo = true
enableRobotsTXT = true

# Allow raw HTML in markdown (showcases content). All content is from trusted sources.
[markup.goldmark.renderer]
unsafe = true

# Hugo settings
[sitemap]
changefreq = 'weekly'
filename = 'sitemap.xml'
priority = 0.5

[params]
customSCSS = ["scss/custom.scss"]
author = "Kirill Kazakov"
info = ["Platform & DevOps Engineer · CTO · Author"]
# SEO: aligned with job-search 10-profile and cv-tailoring (keyword alignment, recruiter visibility)
description = "Kirill Kazakov — Senior Platform & DevOps Engineer, Kubernetes expert, CTO. 17+ years in IT, 9+ in Kubernetes, AWS, Terraform, CI/CD. Author, instructor, GlobalDots."
keywords = "Kirill Kazakov, DevOps, Kubernetes, AWS, Terraform, CI/CD, SRE, platform engineering, CKA, ArgoCD, GitOps, cloud, kazakov.xyz"
# SERP title (default for all pages; theme uses this in <title>)
HeadTitle = "Kirill Kazakov — DevOps & Platform Engineering"
gravatar = "k@kazakov.xyz"

faviconSVG = "/img/favicon.svg"
favicon_32 = "/img/favicon.png"
# og:image for social sharing (LinkedIn, Twitter, Telegram)
images = ["/img/og-image.png"]

since = 2010
enableTwemoji = true
colorScheme = "auto"
hidecolorschemetoggle = false
# Git Commit in Footer, uncomment the line below to enable it
commit = "https://github.com/kksudo/kazakov.xyz/tree/"
powered_by = true
# Series see also post count
maxSeeAlsoItems = 5

[taxonomies]
#tag = "tags"
#author = "authors"

